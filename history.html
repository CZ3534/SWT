<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My History - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <header class="mb-10 text-center">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase text-[10px] tracking-widest font-bold">...</div>
            <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight mb-3">...</h2>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2 border-b dark:border-slate-800 pb-8"></div>
            
            <h3 class="text-2xl font-bold mt-8 text-indigo-600">Entry Manager</h3>
            <p class="text-xs text-slate-400 mt-1">View and manage records from the last 31 days.</p>
        </header>

        <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2rem] p-6 shadow-sm mb-6 max-w-sm mx-auto">
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3 px-1 text-center">Select Time Period</label>
            <select id="dateRange" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 px-4 py-3 rounded-2xl text-xs font-bold mb-2 dark:text-white" onchange="toggleCustomDate()">
                <option value="" disabled selected>Choose Range...</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
                <option value="custom">Custom Range (Max 31 Days)</option>
            </select>

            <div id="custom-date-container" class="hidden grid grid-cols-2 gap-3 mt-4">
                <input type="date" id="startDate" class="bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl text-[10px] p-3 dark:text-white">
                <input type="date" id="endDate" class="bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl text-[10px] p-3 dark:text-white">
            </div>
            
            <button onclick="handleLoadRequest()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl text-[10px] font-bold uppercase mt-4 active:scale-95 transition-all shadow-lg shadow-indigo-500/20">Fetch Records</button>
        </div>

        <div id="results-area" class="hidden">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Logs</p>
                    <span id="stat-reports" class="text-3xl font-bold">0</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase text-indigo-600">Total Souls</p>
                    <span id="stat-souls" class="text-3xl font-bold text-indigo-600">0</span>
                </div>
            </div>

            <section class="bg-white dark:bg-slate-900 rounded-[2.5rem] border dark:border-slate-800 overflow-hidden shadow-sm text-left mb-20">
                <div class="px-6 py-4 border-b dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 font-bold text-[10px] uppercase text-slate-400">
                    Results
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] text-slate-400 uppercase border-b dark:border-slate-800">
                            <tr>
                                <th class="px-6 py-4">Date</th>
                                <th class="px-6 py-4 text-center">Count</th>
                                <th class="px-6 py-4">Note</th>
                                <th class="px-6 py-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-list" class="divide-y dark:divide-slate-800 text-sm"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <div id="initial-message" class="text-center py-20 text-slate-400 italic">
            Select a time period above to manage your logs.
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[100] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const initTheme = () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.getElementById('main-html').classList.add('dark');
                document.getElementById('sun-icon')?.classList.remove('hidden');
                document.getElementById('moon-icon')?.classList.add('hidden');
            }
        };
        initTheme();

        // Global Toast Function
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        };

        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const isDark = html.classList.toggle('dark');
            document.getElementById('sun-icon')?.classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon')?.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace('index.html'); return; }
            const cachedData = sessionStorage.getItem('userContext');
            if (cachedData) {
                const context = JSON.parse(cachedData);
                renderHeader(context.displayName, context.role, context.churchNames || {});
            } else { fetchFreshProfile(user.uid); }
        });

        async function fetchFreshProfile(uid) {
            const snap = await getDoc(doc(db, "profiles", uid));
            if (snap.exists()) {
                const profile = snap.data();
                const churches = {};
                for(const code of (profile.churchId || [])) {
                    const d = await getDoc(doc(db, "churches", code));
                    if(d.exists()) churches[code] = d.data().name;
                }
                renderHeader(profile.displayName, profile.role, churches);
                sessionStorage.setItem('userContext', JSON.stringify({ ...profile, churchNames: churches }));
            }
        }

        function renderHeader(name, role, churches) {
            document.getElementById('user-display-name').innerText = name || "...";
            document.getElementById('role-display').innerText = (role || "Member").toUpperCase();
            const tagContainer = document.getElementById('church-list-tags');
            let tagsHtml = "";
            Object.values(churches).forEach(c => tagsHtml += `<span class="badge-base badge-church">${c}</span>`);
            tagContainer.innerHTML = tagsHtml || `<span class="text-slate-500 text-[10px]">No Church Assigned</span>`;
        }

        window.handleLoadRequest = () => {
            const range = document.getElementById('dateRange').value;
            if(!range) { showToast("Select a time period first."); return; }

            if(range === 'custom') {
                const s = new Date(document.getElementById('startDate').value);
                const e = new Date(document.getElementById('endDate').value);
                if(!s || !e || isNaN(s) || isNaN(e)) { showToast("Please select both dates."); return; }
                
                const diffTime = Math.abs(e - s);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if(diffDays > 31) {
                    showToast("Range cannot exceed 31 days.");
                    return;
                }
            }
            loadHistory();
        };

        async function loadHistory() {
            const user = auth.currentUser;
            const tableBody = document.getElementById('history-list');
            const { startStr, endStr } = getDateStrings();

            document.getElementById('initial-message').classList.add('hidden');
            document.getElementById('results-area').classList.remove('hidden');
            tableBody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-slate-400 italic">Fetching records...</td></tr>';

            try {
                const q = query(
                    collection(db, "salvations"),
                    where("userId", "==", user.uid),
                    where("eventDate", ">=", startStr),
                    where("eventDate", "<=", endStr),
                    orderBy("eventDate", "desc")
                );

                const snapshot = await getDocs(q);
                let rowsHtml = '';
                let soulsTotal = 0;

                snapshot.forEach((snapDoc) => {
                    const data = snapDoc.data();
                    const souls = parseInt(data.count) || 0;
                    soulsTotal += souls;
                    rowsHtml += `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                            <td class="px-6 py-4 text-xs font-medium text-slate-500">${data.eventDate.split('T')[0]}</td>
                            <td class="px-6 py-4 text-center font-bold text-indigo-600">${souls}</td>
                            <td class="px-6 py-4 text-xs text-slate-400 italic truncate max-w-[150px]">${data.note || ''}</td>
                            <td class="px-6 py-4 text-right">
                                <button onclick="deleteEntry('${snapDoc.id}')" class="text-slate-400 hover:text-red-500 p-2 transition-colors">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>`;
                });

                tableBody.innerHTML = rowsHtml || '<tr><td colspan="4" class="text-center py-10 text-slate-400">No records in this range.</td></tr>';
                document.getElementById('stat-reports').innerText = snapshot.size;
                document.getElementById('stat-souls').innerText = soulsTotal;
            } catch (error) { tableBody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-red-400">Error loading data.</td></tr>'; }
        }

        function getDateStrings() {
            const range = document.getElementById('dateRange').value;
            const now = new Date();
            let start = new Date();
            let end = new Date();

            if (range === 'week') {
                start.setDate(now.getDate() - now.getDay());
            } else if (range === 'month') {
                start = new Date(now.getFullYear(), now.getMonth(), 1);
                end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            } else if (range === 'custom') {
                start = new Date(document.getElementById('startDate').value);
                end = new Date(document.getElementById('endDate').value);
            }
            
            return { 
                startStr: start.toISOString().split('T')[0] + "T00:00", 
                endStr: end.toISOString().split('T')[0] + "T23:59" 
            };
        }

        window.deleteEntry = async (id) => {
            if (confirm("Permanently delete this record?")) {
                try {
                    await deleteDoc(doc(db, "salvations", id));
                    showToast("Record deleted.");
                    loadHistory();
                } catch (e) { showToast("Delete failed."); }
            }
        };

        window.toggleCustomDate = () => {
            const isCustom = document.getElementById('dateRange').value === 'custom';
            document.getElementById('custom-date-container').classList.toggle('hidden', !isCustom);
        };
    </script>
</body>
</html>
