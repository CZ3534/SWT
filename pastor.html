<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulwinning Tracker - Pastor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-32 text-center">
        <header class="mb-10">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase tracking-widest font-bold">PASTOR</div>
            <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight mb-3">...</h2>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
            
            <div class="mt-10 max-w-sm mx-auto">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Tools</label>
                <div class="p-4 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] shadow-sm flex flex-col gap-3">
                    <button id="manage-churches-btn" onclick="openChurchManager()" class="w-full text-[10px] font-bold bg-indigo-600 text-white px-6 py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        Manage Churches & Codes
                    </button>
                    <button onclick="window.location.href='members.html'" class="w-full text-[10px] font-bold bg-indigo-600 text-white px-6 py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" /></svg>
                        Member Management
                    </button>
                </div>
            </div>

            <div class="mt-10 max-w-sm mx-auto">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Reports</label>
                <div class="p-6 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] shadow-sm">
                    <select id="churchFilter" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 px-4 py-3 rounded-2xl text-xs font-bold mb-4 pr-10 dark:text-white">
                        <option value="all">All My Churches</option>
                    </select>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-[9px] font-bold text-slate-400 uppercase mb-3 ml-2 text-left tracking-widest">Quick Presets</label>
                            <div class="flex gap-2">
                                <button id="btn-today" onclick="setActivePreset('today')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-[10px] font-bold uppercase transition-all active:scale-95 shadow-sm">Today</button>
                                <button id="btn-week" onclick="setActivePreset('week')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-[10px] font-bold uppercase transition-all active:scale-95 shadow-sm">Week</button>
                                <button id="btn-month" onclick="setActivePreset('month')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-[10px] font-bold uppercase transition-all active:scale-95 shadow-sm">Month</button>
                            </div>
                        </div>

                        <div class="border-t dark:border-slate-800 pt-4 text-left">
                            <label class="block text-[9px] font-bold text-slate-400 uppercase mb-4 ml-2 tracking-widest">Custom Selection</label>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="flex flex-col gap-1.5">
                                    <label for="customDate" class="text-[8px] font-extrabold text-slate-400 uppercase ml-2">Specific Day</label>
                                    <input type="date" id="customDate" oninput="handleCustomInput('date')" class="bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-xl text-[10px] font-bold dark:text-white outline-none focus:border-indigo-500 transition-colors">
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label for="customMonth" class="text-[8px] font-extrabold text-slate-400 uppercase ml-2">Whole Month</label>
                                    <input type="month" id="customMonth" oninput="handleCustomInput('month')" class="bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-xl text-[10px] font-bold dark:text-white outline-none focus:border-indigo-500 transition-colors">
                                </div>
                            </div>
                        </div>

                        <button onclick="loadStats()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20">Generate Report</button>
                    </div>
                </div>
            </div>
        </header>

        <div id="stats-container" class="hidden">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-20">
                <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Salvations</p>
                    <span id="totalSouls" class="text-5xl font-bold text-indigo-600">0</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Participating Members</p>
                    <span id="totalSW" class="text-5xl font-bold text-indigo-600">0</span>
                </div>
            </div>
        </div>
    </main>

    <button onclick="openModal()" class="fab-button bg-indigo-600/90 backdrop-blur-sm shadow-xl active:scale-90 transition-transform">+</button>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[60]">
        </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[100] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, getDocs, collection, query, where, orderBy, setDoc, updateDoc, arrayUnion, addDoc, serverTimestamp, getAggregateFromServer, sum } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null; 
        let churchNames = {};
        let currentPreset = 'month';

        const initTheme = () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.getElementById('main-html').classList.add('dark');
            }
        };
        initTheme();

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        };

        // UI Helpers for Mutually Exclusive Selection
        window.setActivePreset = (p) => {
            currentPreset = p;
            document.getElementById('customDate').value = "";
            document.getElementById('customMonth').value = "";
            
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-indigo-500/40', 'shadow-lg', 'border-indigo-600');
            });
            
            const activeBtn = document.getElementById(`btn-${p}`);
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-indigo-500/40', 'shadow-lg', 'border-indigo-600');
        };

        window.handleCustomInput = (type) => {
            currentPreset = null; // Clear preset logic
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-indigo-500/40', 'shadow-lg', 'border-indigo-600');
            });

            if (type === 'date') document.getElementById('customMonth').value = "";
            else document.getElementById('customDate').value = "";
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { sessionStorage.clear(); window.location.replace("index.html"); return; }
            try {
                const snap = await getDoc(doc(db, "profiles", user.uid));
                if (!snap.exists()) { window.location.replace("onboarding.html"); return; }
                userProfile = snap.data();
                
                // BOUNCER: Only allow Pastors here
                if (userProfile.role !== 'pastor') { window.location.replace("index.html"); return; }
                
                if (userProfile.status === 'inactive') { await signOut(auth); window.location.replace("index.html"); return; }
                await refreshUI();
                setActivePreset('month');
            } catch (e) { window.location.replace("index.html"); }
        });

        // ... refreshUI, populate functions same as original ...

        window.loadStats = async () => {
            const selCh = document.getElementById('churchFilter').value;
            const cDate = document.getElementById('customDate').value;
            const cMonth = document.getElementById('customMonth').value;

            document.getElementById('stats-container').classList.remove('hidden');
            document.getElementById('totalSouls').innerText = "...";
            document.getElementById('totalSW').innerText = "...";

            try {
                let soulQuery;
                let bucketPaths = [];
                const now = new Date();
                const todayStr = now.toISOString().split('T')[0];

                // 1. DATE SELECTION
                if (cDate) {
                    bucketPaths.push(`daily_stats/${cDate}`);
                    soulQuery = query(collection(db, "salvations"), where("churchId", "in", userProfile.churchId), where("eventDate", ">=", cDate + "T00:00"), where("eventDate", "<=", cDate + "T23:59"));
                } 
                else if (cMonth) {
                    bucketPaths.push(`monthly_stats/${cMonth}`);
                    soulQuery = query(collection(db, "salvations"), where("churchId", "in", userProfile.churchId), where("eventDate", ">=", cMonth + "-01T00:00"), where("eventDate", "<=", cMonth + "-31T23:59"));
                }
                else if (currentPreset === 'today') {
                    bucketPaths.push(`daily_stats/${todayStr}`);
                    soulQuery = query(collection(db, "salvations"), where("churchId", "in", userProfile.churchId), where("eventDate", ">=", todayStr + "T00:00"));
                }
                else if (currentPreset === 'month') {
                    const thisMonthStr = todayStr.substring(0, 7);
                    bucketPaths.push(`monthly_stats/${thisMonthStr}`);
                    soulQuery = query(collection(db, "salvations"), where("churchId", "in", userProfile.churchId), where("eventDate", ">=", thisMonthStr + "-01T00:00"));
                }
                else if (currentPreset === 'week') {
                    const sunday = new Date(now.setDate(now.getDate() - now.getDay()));
                    const sundayStr = sunday.toISOString().split('T')[0];
                    for(let i=0; i<7; i++) {
                        const d = new Date(sunday); d.setDate(sunday.getDate() + i);
                        bucketPaths.push(`daily_stats/${d.toISOString().split('T')[0]}`);
                    }
                    soulQuery = query(collection(db, "salvations"), where("churchId", "in", userProfile.churchId), where("eventDate", ">=", sundayStr + "T00:00"));
                }

                // 2. RUN REPORT
                const soulSnap = await getAggregateFromServer(soulQuery, { total: sum('count') });
                const totalValue = soulSnap.data().total;

                if (totalValue === null || totalValue === 0) {
                    document.getElementById('totalSouls').innerText = "0";
                    document.getElementById('totalSW').innerText = "0";
                    showToast("No records found.");
                    return;
                }
                document.getElementById('totalSouls').innerText = totalValue;

                // 3. MEMBER BUCKETS
                let uniqueUIDs = new Set();
                const churchIds = (selCh === 'all') ? userProfile.churchId : [selCh];
                for (const chId of churchIds) {
                    for (const path of bucketPaths) {
                        const bSnap = await getDoc(doc(db, `churches/${chId}/${path}`));
                        if (bSnap.exists()) {
                            (bSnap.data().members || []).forEach(id => uniqueUIDs.add(id));
                        }
                    }
                }
                document.getElementById('totalSW').innerText = uniqueUIDs.size;

            } catch(e) { 
                console.error(e);
                showToast(e.code === 'failed-precondition' ? "Index Build Required." : "Load Error.");
            }
        };

        // ... Remaining functions (logout, church manager) same as original ...
    </script>
</body>
</html>
