<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulwinning Tracker - Pastor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-32 text-center">
        <header class="mb-10">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase tracking-widest font-bold">PASTOR</div>
            <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight mb-3">...</h2>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
            
            <div class="mt-10 max-w-sm mx-auto">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Tools</label>
                <div class="p-4 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] shadow-sm flex flex-col gap-3">
                    <button id="manage-churches-btn" onclick="openChurchManager()" class="w-full text-[10px] font-bold bg-indigo-600 text-white px-6 py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        Manage Churches & Codes
                    </button>
                    <button onclick="window.location.href='leaderboard.html'" class="w-full text-[10px] font-bold bg-indigo-600 text-white px-6 py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20">
                        Leaderboard
                    </button>
                </div>
            </div>

            <div class="mt-8 max-w-sm mx-auto">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Personal</label>
                <div class="p-4 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] shadow-sm flex flex-col gap-3">
                    <button onclick="window.open('https://forms.gle/bQvsGq9EgJ2PiHYP8', '_blank')" class="w-full text-[10px] font-bold bg-indigo-600 text-white px-6 py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                        Record Prospect Contacts
                    </button>
                    <button onclick="window.location.href='history.html'" class="w-full text-[10px] font-bold bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 px-6 py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-sm">
                        My History
                    </button>
                </div>
            </div>

            <div class="mt-10 max-w-sm mx-auto">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Reports</label>
                <div class="p-6 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] shadow-sm">
                    <select id="churchFilter" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 px-4 py-3 rounded-2xl text-xs font-bold mb-2 pr-10 dark:text-white">
                        <option value="all">All Churches</option>
                    </select>
                    <select id="dateFilterRange" onchange="toggleCustomDate()" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 px-4 py-3 rounded-2xl text-xs font-bold mb-4 pr-10 dark:text-white">
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month" selected>This Month</option>
                        <option value="custom">Custom Range</option>
                    </select>
                    <div id="custom-date-container" class="hidden flex gap-2 mb-4">
                        <input type="date" id="startDate" class="flex-1 bg-slate-50 border rounded-xl text-[10px] p-2 dark:bg-slate-800 dark:text-white">
                        <input type="date" id="endDate" class="flex-1 bg-slate-50 border rounded-xl text-[10px] p-2 dark:bg-slate-800 dark:text-white">
                    </div>
                    <button onclick="loadStats()" class="w-full py-3 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20">Load Data</button>
                </div>
            </div>
        </header>

        <div id="stats-container" class="hidden">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-20">
                <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Salvations</p>
                    <span id="totalSouls" class="text-5xl font-bold text-indigo-600">0</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Active Members</p>
                    <span id="totalSW" class="text-5xl font-bold text-indigo-600">0</span>
                </div>
            </div>
        </div>
    </main>

    <button onclick="openModal()" class="fab-button bg-indigo-600/90 backdrop-blur-sm shadow-xl active:scale-90 transition-transform">+</button>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[60]">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 border text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-8 dark:text-white">Log Salvation</h3>
            <div class="flex items-center justify-between mb-6 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-3xl">
                <button onclick="decrement()" class="w-12 h-12 rounded-2xl bg-white dark:bg-slate-700 font-bold text-xl hover:bg-slate-100 transition-all">-</button>
                <input id="soulCount" type="number" value="1" readonly class="w-20 text-center text-5xl font-light bg-transparent text-indigo-600">
                <button onclick="increment()" class="w-12 h-12 rounded-2xl bg-indigo-600 text-white font-bold text-xl hover:bg-indigo-700 transition-all">+</button>
            </div>
            <input id="soulDateTime" type="datetime-local" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm mb-4 outline-none dark:bg-slate-800 dark:text-white">
            <input id="soulNote" type="text" placeholder="Names/Location..." class="w-full p-4 bg-slate-50 border rounded-2xl text-sm mb-8 outline-none dark:bg-slate-800 dark:text-white">
            <div class="flex gap-3"><button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold">Cancel</button><button id="submit-btn" onclick="handleDataSubmit()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold">Submit</button></div>
        </div>
    </div>

    <div id="church-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-50">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-[2.5rem] p-8 border shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center dark:text-white">Church Management</h3>
            <div id="church-list" class="space-y-1 mb-6 max-h-72 overflow-y-auto pr-2 custom-scroll"></div>
            <div class="border-t pt-6">
                <input id="newChurchName" type="text" placeholder="Church Name" class="w-full p-4 mb-4 bg-slate-50 border rounded-2xl outline-none dark:bg-slate-800 dark:text-white">
                <div class="flex gap-3"><button onclick="closeChurchManager()" class="flex-1 py-4 text-slate-400">Close</button><button id="add-btn" onclick="addNewChurch()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold">Add Code</button></div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[100] pointer-events-none text-sm font-bold">Record Saved. Thank you.</div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, getDocs, collection, query, where, orderBy, setDoc, updateDoc, arrayUnion, addDoc, serverTimestamp, getAggregateFromServer, sum, count } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null; let churchNames = {};

        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) {
                document.getElementById('main-html').classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            } else {
                document.getElementById('main-html').classList.remove('dark');
                document.getElementById('sun-icon').classList.add('hidden');
                document.getElementById('moon-icon').classList.remove('hidden');
            }
        };
        initTheme();

        onAuthStateChanged(auth, async (user) => {
            if (!user) { 
                sessionStorage.clear();
                window.location.replace("index.html"); 
                return; 
            }

            const cachedData = sessionStorage.getItem('userContext');
            if (cachedData) {
                userProfile = JSON.parse(cachedData);
                churchNames = userProfile.churchNames || {};
                if (userProfile.role !== 'pastor') {
                    window.location.replace("member.html");
                    return;
                }
                renderProfileUI(userProfile);
            } else {
                const snap = await getDoc(doc(db, "profiles", user.uid));
                if (!snap.exists()) { window.location.replace("onboarding.html"); return; }
                userProfile = snap.data();
                if (userProfile.role === 'superadmin') { window.location.replace("admin.html"); return; }
                if (userProfile.role !== 'pastor') { window.location.replace("member.html"); return; }
                await refreshUI();
            }
        });

        async function refreshUI() {
            const filter = document.getElementById('churchFilter');
            filter.innerHTML = '<option value="all">All Churches</option>';
            for(const code of userProfile.churchId) {
                const d = await getDoc(doc(db, "churches", code));
                if(d.exists()) { churchNames[code] = d.data().name; }
            }
            sessionStorage.setItem('userContext', JSON.stringify({
                ...userProfile,
                churchNames: churchNames
            }));
            renderProfileUI(userProfile);
        }

        function renderProfileUI(profile) {
            document.getElementById('user-display-name').innerText = profile.displayName;
            document.getElementById('role-display').innerText = profile.role.toUpperCase();
            const filter = document.getElementById('churchFilter');
            const tagContainer = document.getElementById('church-list-tags');
            let tagsHtml = "";
            filter.innerHTML = '<option value="all">All Churches</option>';
            Object.keys(churchNames).forEach(code => {
                const name = churchNames[code];
                tagsHtml += `<span class="badge-base badge-church">${name}</span>`;
                filter.innerHTML += `<option value="${code}">${name}</option>`;
            });
            tagContainer.innerHTML = tagsHtml;
        }

        window.toggleDarkMode = () => { 
            const html = document.getElementById('main-html'); 
            const isDark = html.classList.toggle('dark'); 
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light'); 
        };

        window.openChurchManager = () => {
            const list = document.getElementById('church-list'); list.innerHTML = "";
            userProfile.churchId.forEach(c => {
                list.innerHTML += `<div class="church-card flex justify-between items-center"><div class="text-left"><p class="text-[9px] font-bold text-emerald-500 uppercase">${churchNames[c] || 'Church'}</p><p class="text-base font-mono font-bold dark:text-white">${c}</p></div><button onclick="navigator.clipboard.writeText('${c}'); alert('Copied!');" class="text-xs font-bold text-slate-400 hover:text-indigo-500">Copy</button></div>`;
            });
            document.getElementById('church-modal').classList.remove('hidden');
        };

        window.addNewChurch = async () => {
            const n = document.getElementById('newChurchName').value; if(!n) return;
            const c = Math.random().toString(36).substring(2, 8).toUpperCase();
            try {
                await setDoc(doc(db, "churches", c), { name: n, pastorId: auth.currentUser.uid });
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { churchId: arrayUnion(c) });
                userProfile.churchId.push(c);
                document.getElementById('newChurchName').value = "";
                sessionStorage.removeItem('userContext');
                await refreshUI(); 
                openChurchManager();
            } catch(e) { alert(e.message); }
        };

        window.loadStats = async () => {
            const range = document.getElementById('dateFilterRange').value;
            const selCh = document.getElementById('churchFilter').value;
            document.getElementById('stats-container').classList.remove('hidden');
            document.getElementById('totalSouls').innerText = "...";
            document.getElementById('totalSW').innerText = "...";

            try {
                let baseQuery = collection(db, "salvations");
                let constraints = [];
                
                if (selCh === 'all') constraints.push(where("churchId", "in", userProfile.churchId));
                else constraints.push(where("churchId", "==", selCh));

                const now = new Date(); 
                let startLimit = null;
                if(range === 'today') { startLimit = new Date(now.setHours(0,0,0,0)).toISOString(); }
                else if(range === 'week') { 
                    const sW = new Date(now); 
                    sW.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)); 
                    startLimit = new Date(sW.setHours(0,0,0,0)).toISOString(); 
                }
                else if(range === 'month') { startLimit = new Date(now.getFullYear(), now.getMonth(), 1).toISOString(); }
                else if(range === 'custom') { startLimit = new Date(document.getElementById('startDate').value).toISOString(); }

                if(startLimit) constraints.push(where("eventDate", ">=", startLimit));
                if(range === 'custom') constraints.push(where("eventDate", "<=", new Date(new Date(document.getElementById('endDate').value).setHours(23,59,59)).toISOString()));

                const q = query(baseQuery, ...constraints);
                
                const soulSnap = await getAggregateFromServer(q, { total: sum('count') });
                document.getElementById('totalSouls').innerText = soulSnap.data().total || 0;

                const memberSnap = await getDocs(q);
                let uniqueUsers = new Set();
                memberSnap.forEach(d => uniqueUsers.add(d.data().userId));
                document.getElementById('totalSW').innerText = uniqueUsers.size;

            } catch(e) { console.error(e); alert("Error loading stats. Indexing might be in progress."); }
        };

        window.handleDataSubmit = async () => {
            const btn = document.getElementById('submit-btn'); btn.innerText = "Saving..."; btn.disabled = true;
            try {
                await addDoc(collection(db, "salvations"), {
                    count: Number(document.getElementById('soulCount').value),
                    note: document.getElementById('soulNote').value,
                    eventDate: document.getElementById('soulDateTime').value,
                    userId: auth.currentUser.uid,
                    userEmail: auth.currentUser.email,
                    churchId: userProfile.churchId[0],
                    timestamp: serverTimestamp()
                });
                closeModal();
                const t = document.getElementById('toast'); t.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
            } catch(e) { alert(e.message); } finally { btn.innerText = "Submit"; btn.disabled = false; }
        };

        window.handleLogout = () => signOut(auth).then(() => {
            sessionStorage.clear();
            window.location.replace("index.html");
        });
        window.closeChurchManager = () => document.getElementById('church-modal').classList.add('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.openModal = () => { document.getElementById('modal').classList.remove('hidden'); document.getElementById('soulCount').value = 1; document.getElementById('soulDateTime').value = new Date(Date.now() - new Date().getTimezoneOffset()*60000).toISOString().slice(0, 16); };
        window.increment = () => document.getElementById('soulCount').value++;
        window.decrement = () => { if(document.getElementById('soulCount').value > 1) document.getElementById('soulCount').value--; };
        window.toggleCustomDate = () => document.getElementById('custom-date-container').classList.toggle('hidden', document.getElementById('dateFilterRange').value !== 'custom');
    </script>
</body>
</html>
